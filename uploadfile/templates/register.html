{% load static %}
<!doctype html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>ثبت نام</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <style>
        .register-container {
            max-width: 900px;
            margin: 0px auto;
            margin-top: 35px;
            padding: 0 15px;
        }

        .register-card {
            background: white;
            padding: 45px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            border-top: 5px solid #59c2e2;
        }

        .register-header {
            text-align: center;
            margin-bottom: 35px;
            padding-bottom: 25px;
            border-bottom: 2px solid #f0f0f0;
        }

        .register-header h1 {
            margin: 0;
            font-size: 1.8em;
            font-weight: 700;
            color: #222;
        }

        .form-group {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 28px;
        }

        .form-group label {
            flex: 0 0 auto;
            min-width: 120px;
            margin: 0;
            font-weight: 600;
            color: #333;
            font-size: 0.95em;
            text-align: right;
            white-space: nowrap;
        }

        .form-group input {
            flex: 1;
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95em;
            font-family: "Vazirmatn", Tahoma, Arial, sans-serif;
            direction: rtl;
            text-align: right;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #5dabeb;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .form-group input:focus {
            outline: none;
            border-color: #5dabeb;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .register-btn {
            display: block;
            width: 100%;
            max-width: 180px;
            margin-right: 316px;
            padding: 14px;
            margin-top: 20px;
            background: linear-gradient(135deg, #5ac3ec 0%, #4452a3 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.05em;
            font-weight: 400;
            font-family: "Vazirmatn", Tahoma, Arial, sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.25);
            text-align: center;
        }

        .register-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.35);
        }

        .error-box {
            background: #fff5f5;
            color: #c53030;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-right: 4px solid #c53030;
            text-align: right;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.95em;
        }

        .login-link a {
            color: #5ac3ec;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .login-link a:hover {
            color: #4452a3;
        }

        @media (max-width: 520px) {
            .register-container {
                margin: 20px auto;
                padding: 0 10px;
            }

            .register-card {
                padding: 25px 20px;
            }

            .register-header h1 {
                font-size: 1.4em;
            }

            .form-group {
                flex-direction: column;
                align-items: flex-end;
                gap: 8px;
                margin-bottom: 20px;
            }

            .form-group label {
                width: 100%;
                min-width: auto;
                text-align: right;
            }

            .form-group input {
                width: 100%;
            }

            .register-btn {
                padding: 13px 28px;
                font-size: 0.95em;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <div class="register-header">
                <h1>ثبت نام حساب جدید</h1>
            </div>

            {% if error %}
                <div class="error-box">{{ error }}</div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label for="username">نام کاربری</label>
                    <input type="text" name="username" id="username" required>
                </div>

                <div class="form-group">
                    <label for="password">رمز عبور</label>
                    <input type="password" name="password" id="password" required>
                </div>

                <div class="form-group">
                    <label for="password_confirm">تکرار رمز عبور</label>
                    <input type="password" name="password_confirm" id="password_confirm" required>
                </div>

                <button type="submit" class="register-btn">ثبت نام</button>
            </form>

            <div class="login-link">
                <span>حساب کاربری دارید؟</span>
                <a href="{% url 'uploadfile:login' %}">وارد شوید</a>
            </div>
        </div>
    </div>
</body>
</html>
